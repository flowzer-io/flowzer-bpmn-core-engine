name: CI

on:
  pull_request:
    branches:
      - next
      - main
  push:
    branches:
      - next
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NODE_VERSION: '20'
  QUARANTINED_TEST_FILTER: >-
    FullyQualifiedName!=core_engine_tests.EngineTest.ParallelTaskTest
    &FullyQualifiedName!=core_engine_tests.EngineTest.SequentialTest

jobs:
  dotnet:
    name: Restore, Build und Tests (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: .NET-SDK einrichten
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Abhängigkeiten wiederherstellen
        run: dotnet restore core-engine.sln

      - name: Solution bauen
        run: dotnet build core-engine.sln --no-restore --configuration Release

      - name: Tests mit Coverage ausführen
        run: |
          dotnet test src/core-engine-tests/core-engine-tests.csproj \
            --no-restore \
            --no-build \
            --configuration Release \
            --filter "${QUARANTINED_TEST_FILTER}" \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=core-engine-tests.trx" \
            --results-directory ./TestResults/ci

      - name: Web-API-Tests ausführen
        run: |
          dotnet test src/WebApiEngine.Tests/WebApiEngine.Tests.csproj \
            --no-restore \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=webapi-tests.trx" \
            --results-directory ./TestResults/ci

      - name: Frontend-Unit-Tests ausführen
        run: |
          dotnet test src/FlowzerFrontend.Tests/FlowzerFrontend.Tests.csproj \
            --no-restore \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=frontend-tests.trx" \
            --results-directory ./TestResults/ci

      - name: Coverage-Kennzahlen extrahieren
        id: coverage
        run: |
          python3 <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          matches = glob.glob('TestResults/ci/**/coverage.cobertura.xml', recursive=True)
          if not matches:
              raise SystemExit('Keine coverage.cobertura.xml gefunden.')

          report = matches[0]
          root = ET.parse(report).getroot()
          line_rate = float(root.attrib.get('line-rate', '0')) * 100
          branch_rate = float(root.attrib.get('branch-rate', '0')) * 100

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f"report={report}\n")
              handle.write(f"line_rate={line_rate:.2f}\n")
              handle.write(f"branch_rate={branch_rate:.2f}\n")
          PY

      - name: Testartefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-testresults
          path: TestResults/ci
          if-no-files-found: error

      - name: CI-Zusammenfassung schreiben
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## .NET-Validierung

          - Restore und Build laufen auf GitHub Actions reproduzierbar.
          - Zusätzlich laufen Web-API- und Frontend-Unit-Tests im selben Job mit.
          - Quarantänisierte Tests (temporär bis zur separaten Behebung):
            - `core_engine_tests.EngineTest.ParallelTaskTest`
            - `core_engine_tests.EngineTest.SequentialTest`
          - Coverage (Cobertura): **${{ steps.coverage.outputs.line_rate }} %** Line Rate / **${{ steps.coverage.outputs.branch_rate }} %** Branch Rate
          - Coverage-Report: `${{ steps.coverage.outputs.report }}`
          EOF

  bpmn_io:
    name: Build für bpmn.io
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: bpmn.io/package-lock.json

      - name: Node-Abhängigkeiten installieren
        working-directory: bpmn.io
        run: npm ci

      - name: BPMN-Frontend bauen
        working-directory: bpmn.io
        run: npm run build

  frontend_smoke:
    name: UI-Smoke-Tests
    runs-on: ubuntu-latest
    needs:
      - dotnet

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: .NET-SDK einrichten
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tests/ui-smoke/package-lock.json

      - name: Abhängigkeiten wiederherstellen
        run: dotnet restore core-engine.sln

      - name: Solution bauen
        run: dotnet build core-engine.sln --no-restore --configuration Release

      - name: Playwright-Abhängigkeiten installieren
        working-directory: tests/ui-smoke
        run: npm ci

      - name: Chromium für Playwright installieren
        working-directory: tests/ui-smoke
        run: npm run install:browsers

      - name: UI-Smoke-Tests ausführen
        working-directory: tests/ui-smoke
        run: npm test

      - name: Playwright-Artefakte hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-report
          path: |
            tests/ui-smoke/playwright-report
            tests/ui-smoke/test-results
          if-no-files-found: ignore

      - name: CI-Zusammenfassung schreiben
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## UI-Smoke-Tests

          - Playwright prüft die Kernrouten `/`, `/models`, `/forms` und `/instances`.
          - Web-API und Blazor-Frontend werden im Testjob reproduzierbar lokal gestartet.
          - Artefakte mit HTML-Report und Testresultaten werden bei Bedarf hochgeladen.
          EOF
